<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory - Mi habitación y verbos</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; }
        .game-board { display: grid; grid-template-columns: repeat(6, 100px); gap: 10px; justify-content: center; margin-top: 20px; }
        .card { width: 90px; height: 90px; background-color: lightgray; display: flex; align-items: center; justify-content: center; 
                font-size: 14px; cursor: pointer; border-radius: 10px; border: 1px solid black; text-align: center; }
        .flipped { background-color: white; }
        .matched { background-color: lightgreen; pointer-events: none; }
    </style>
</head>
<body>
    <h2>Memory: Verbos y objetos de mi habitación</h2>
    <p>Encuentra las parejas correctas.</p>
    <p>Turnos: <span id="turnCounter">0</span></p>
    <div class="game-board" id="gameBoard"></div>
    <button onclick="resetGame()">Reiniciar</button>

    <script>
        let turnCount = 0;
        const turnCounter = document.getElementById("turnCounter");
        
        const cardsData = [
            { text: "la cama", pair: "das Bett" },
            { text: "das Bett", pair: "la cama" },
            { text: "el escritorio", pair: "der Schreibtisch" },
            { text: "der Schreibtisch", pair: "el escritorio" },
            { text: "las Ciencias Naturales", pair: "die Naturwissenschaften" },
            { text: "die Naturwissenschaften", pair: "las Ciencias Naturales" },
            { text: "el lápiz", pair: "der Bleistift" },
            { text: "der Bleistift", pair: "el lápiz" },
            { text: "el patio", pair: "der Hof" },
            { text: "der Hof", pair: "el patio" },
            { text: "el horario", pair: "der Stundenplan" },
            { text: "der Stundenplan", pair: "el horario" },
            { text: "la puerta", pair: "die Tür" },
            { text: "die Tür", pair: "la puerta" },
            { text: "el portátil", pair: "der Laptop" },
            { text: "der Laptop", pair: "el portátil" },
            { text: "la estantería", pair: "das Regal" },
            { text: "das Regal", pair: "la estantería" },
            { text: "la calculadora", pair: "der Taschenrechner" },
            { text: "der Taschenrechner", pair: "la calculadora" },
            { text: "el armario", pair: "der Kleiderschrank" },
            { text: "der Kleiderschrank", pair: "el armario" },
            { text: "el bolígrafo", pair: "der Füller" },
            { text: "der Füller", pair: "el bolígrafo" },
            { text: "la Educación Física", pair: "der Sportunterricht" },
            { text: "der Sportunterricht", pair: "la Educación Física" },
            { text: "la Expresión Plástica", pair: "der Kunstunterricht" },
            { text: "der Kunstunterricht", pair: "la Expresión Plástica" },
            { text: "el libro", pair: "das Buch" },
            { text: "das Buch", pair: "el libro" },
            { text: "el televisor", pair: "der Fernseher" },
            { text: "der Fernseher", pair: "el televisor" },
            { text: "las Matemáticas", pair: "der Mathematikunterricht" },
            { text: "der Mathematikunterricht", pair: "las Matemáticas" },
            { text: "el póster", pair: "das Poster" },
            { text: "das Poster", pair: "el póster" }
        ];

        let shuffledCards = [];
        let firstCard = null;
        let secondCard = null;
        let lockBoard = false;

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function createBoard() {
            const board = document.getElementById("gameBoard");
            board.innerHTML = "";
            shuffledCards = shuffle([...cardsData]);
            turnCount = 0;
            turnCounter.innerText = turnCount;

            shuffledCards.forEach((card, index) => {
                const div = document.createElement("div");
                div.classList.add("card");
                div.dataset.value = card.pair;
                div.dataset.text = card.text;
                div.innerText = "?";
                div.addEventListener("click", () => flipCard(div));
                board.appendChild(div);
            });
        }

        function flipCard(card) {
            if (lockBoard || card.classList.contains("flipped")) return;

            card.classList.add("flipped");
            card.innerText = card.dataset.text;

            if (!firstCard) {
                firstCard = card;
                return;
            }

            secondCard = card;
            lockBoard = true;
            turnCount++;
            turnCounter.innerText = turnCount;

            if (firstCard.dataset.text === secondCard.dataset.value || secondCard.dataset.text === firstCard.dataset.value) {
                firstCard.classList.add("matched");
                secondCard.classList.add("matched");
                resetTurn();
            } else {
                setTimeout(() => {
                    firstCard.classList.remove("flipped");
                    secondCard.classList.remove("flipped");
                    firstCard.innerText = "?";
                    secondCard.innerText = "?";
                    resetTurn();
                }, 1000);
            }
        }

        function resetTurn() {
            [firstCard, secondCard] = [null, null];
            lockBoard = false;
        }

        function resetGame() {
            firstCard = null;
            secondCard = null;
            lockBoard = false;
            createBoard();
        }

        createBoard();
    </script>
</body>
</html>
